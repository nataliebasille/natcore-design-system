name: Release core v2 to GitHub Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: "@nataliebasille"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Determine release
        id: release
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          import path from "node:path";
          import { execFileSync } from "node:child_process";

          const packageName = "@nataliebasille/natcore-design-system";
          const packageJson = JSON.parse(
            fs.readFileSync("packages/core/package.json", "utf8"),
          );

          if (packageJson.name !== packageName) {
            throw new Error(`Unexpected package name: ${packageJson.name}`);
          }

          if (packageJson.private) {
            throw new Error("packages/core must not be private before publish.");
          }

          let publishedVersion = "";
          try {
            publishedVersion = execFileSync(
              "npm",
              [
                "view",
                packageName,
                "version",
                "--registry=https://npm.pkg.github.com",
              ],
              {
                encoding: "utf8",
                env: {
                  ...process.env,
                  NODE_AUTH_TOKEN: process.env.NODE_AUTH_TOKEN,
                },
                stdio: ["ignore", "pipe", "ignore"],
              },
            ).trim();
          } catch {
            publishedVersion = "";
          }

          const setOutput = (key, value) =>
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `${key}=${value}\n`);

          if (!publishedVersion) {
            if (packageJson.version !== "2.0.0") {
              throw new Error(
                `Initial core v2 release must be 2.0.0, found ${packageJson.version}`,
              );
            }

            setOutput("should_release", "true");
            setOutput("release_type", "initial");
            setOutput("reason", "Package has not been published yet.");
            process.exit(0);
          }

          const changesetDir = ".changeset";
          const changesetFiles = fs
            .readdirSync(changesetDir)
            .filter((file) => file.endsWith(".md") && file !== "README.md");

          const bumpRank = { patch: 1, minor: 2 };
          let releaseType = "";

          for (const file of changesetFiles) {
            const content = fs.readFileSync(
              path.join(changesetDir, file),
              "utf8",
            );
            const frontmatter = content.match(/^---\r?\n([\s\S]*?)\r?\n---/);

            if (!frontmatter) {
              continue;
            }

            const packageBump = frontmatter[1].match(
              new RegExp(`["']?${packageName.replace("/", "\\/")}["']?:\\s*(\\w+)`),
            );

            if (!packageBump) {
              continue;
            }

            const bump = packageBump[1];

            if (bump === "major") {
              throw new Error(
                `${file} requests a major release for ${packageName}; core v2 releases only support patch or minor bumps.`,
              );
            }

            if (!bumpRank[bump]) {
              throw new Error(
                `${file} has unsupported release type "${bump}" for ${packageName}.`,
              );
            }

            if (!releaseType || bumpRank[bump] > bumpRank[releaseType]) {
              releaseType = bump;
            }
          }

          if (!releaseType) {
            setOutput("should_release", "false");
            setOutput("release_type", "none");
            setOutput(
              "reason",
              `No patch or minor changeset found for ${packageName}.`,
            );
            process.exit(0);
          }

          setOutput("should_release", "true");
          setOutput("release_type", releaseType);
          setOutput("reason", `${releaseType} changeset found.`);
          NODE
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip release
        if: ${{ steps.release.outputs.should_release != 'true' }}
        run: echo "${{ steps.release.outputs.reason }}"

      - name: Apply changeset version
        if: ${{ steps.release.outputs.release_type == 'patch' || steps.release.outputs.release_type == 'minor' }}
        run: pnpm changeset version

      - name: Validate initial version
        if: ${{ steps.release.outputs.release_type == 'initial' }}
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const packageJson = JSON.parse(
            fs.readFileSync("packages/core/package.json", "utf8"),
          );

          if (packageJson.version !== "2.0.0") {
            throw new Error(
              `Initial core v2 release must be 2.0.0, found ${packageJson.version}`,
            );
          }
          NODE

      - name: Run release tests
        if: ${{ steps.release.outputs.should_release == 'true' }}
        run: pnpm test:core:2x

      - name: Build package
        if: ${{ steps.release.outputs.should_release == 'true' }}
        run: pnpm --filter @nataliebasille/natcore-design-system build

      - name: Read release version
        if: ${{ steps.release.outputs.should_release == 'true' }}
        id: package
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit release changes
        if: ${{ steps.release.outputs.release_type == 'patch' || steps.release.outputs.release_type == 'minor' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .changeset packages/core/package.json packages/core/CHANGELOG.md
          git commit -m "chore: release core v${{ steps.package.outputs.version }} [skip ci]"
          git push

      - name: Auth check
        if: ${{ steps.release.outputs.should_release == 'true' }}
        run: |
          echo "scope registry => $(npm config get @nataliebasille:registry)"
          node -e "console.log(!!process.env.NODE_AUTH_TOKEN && 'TOKEN_PRESENT')"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        if: ${{ steps.release.outputs.should_release == 'true' }}
        working-directory: packages/core
        run: pnpm publish --no-git-checks --access restricted --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release tag
        if: ${{ steps.release.outputs.should_release == 'true' }}
        run: |
          git tag "core-v${{ steps.package.outputs.version }}"
          git push origin "core-v${{ steps.package.outputs.version }}"
