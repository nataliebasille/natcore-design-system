name: Release core v2 to GitHub Packages

on:
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_type:
        description: Use auto normally. Use initial only to force the first 2.0.0 publish.
        required: true
        default: auto
        type: choice
        options:
          - auto
          - initial
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: "@nataliebasille"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Determine release
        id: release
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          import { execFileSync } from "node:child_process";

          const packageName = "@nataliebasille/natcore-design-system";
          const requestedReleaseType = process.env.REQUESTED_RELEASE_TYPE || "auto";
          const packageJson = JSON.parse(
            fs.readFileSync("packages/core/package.json", "utf8"),
          );

          if (packageJson.name !== packageName) {
            throw new Error(`Unexpected package name: ${packageJson.name}`);
          }

          if (packageJson.private) {
            throw new Error("packages/core must not be private before publish.");
          }

          const setOutput = (key, value) => {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `${key}=${value}\n`);
          };

          let publishedVersions = [];
          try {
            const versionsOutput = execFileSync(
              "npm",
              [
                "view",
                packageName,
                "versions",
                "--json",
                "--registry=https://npm.pkg.github.com",
              ],
              {
                encoding: "utf8",
                env: {
                  ...process.env,
                  NODE_AUTH_TOKEN: process.env.NODE_AUTH_TOKEN,
                },
                stdio: ["ignore", "pipe", "ignore"],
              },
            ).trim();
            const parsedVersions = JSON.parse(versionsOutput);
            publishedVersions =
              Array.isArray(parsedVersions) ? parsedVersions : [parsedVersions];
          } catch {
            publishedVersions = [];
          }

          console.log(
            `Published versions seen for ${packageName}: ${
              publishedVersions.length > 0 ? publishedVersions.join(", ") : "(none)"
            }`,
          );

          const hasPublishedV2 = publishedVersions.some((version) => {
            const major = Number(String(version).split(".")[0]);
            return major === 2;
          });

          if (requestedReleaseType !== "auto") {
            if (requestedReleaseType === "initial") {
              if (packageJson.version !== "2.0.0") {
                throw new Error(
                  `Initial core v2 release must be 2.0.0, found ${packageJson.version}`,
                );
              }

              setOutput("should_release", "true");
              setOutput("release_type", "initial");
              setOutput("release_source", "manual");
              setOutput("reason", "Manual initial release requested.");
              process.exit(0);
            }

            setOutput("should_release", "true");
            setOutput("release_type", requestedReleaseType);
            setOutput("release_source", "manual");
            setOutput("reason", `Manual ${requestedReleaseType} release requested.`);
            process.exit(0);
          }

          if (!hasPublishedV2) {
            if (packageJson.version !== "2.0.0") {
              throw new Error(
                `Initial core v2 release must be 2.0.0, found ${packageJson.version}`,
              );
            }

            setOutput("should_release", "true");
            setOutput("release_type", "initial");
            setOutput("release_source", "auto");
            setOutput("reason", "Package has not published a v2 release yet.");
            process.exit(0);
          }

          const before = process.env.BEFORE_SHA;
          const after = process.env.AFTER_SHA || "HEAD";
          const bumpRank = { patch: 1, minor: 2, major: 3 };
          let releaseType = "";
          let commitMessages = "";

          try {
            const range =
              before && !/^0+$/.test(before) ? `${before}..${after}` : after;
            commitMessages = execFileSync(
              "git",
              ["log", range, "--format=%B%n---END-COMMIT---"],
              { encoding: "utf8" },
            );
          } catch {
            commitMessages = execFileSync(
              "git",
              ["log", "-1", "--format=%B"],
              { encoding: "utf8" },
            );
          }

          console.log("Commit messages considered for release:");
          console.log(commitMessages);

          const commits = commitMessages
            .split("---END-COMMIT---")
            .map((message) => message.trim())
            .filter(Boolean);

          const bumpForCommit = (message) => {
            const firstLine = message.split(/\r?\n/, 1)[0]?.trim() ?? "";

            if (
              /\bbreaking\b/i.test(firstLine) ||
              /BREAKING CHANGE:/i.test(message) ||
              /^[a-z]+(?:\([^)]+\))?!:/i.test(firstLine)
            ) {
              return "major";
            }

            if (/^feat(?:\([^)]+\))?:/i.test(firstLine)) {
              return "minor";
            }

            if (/^(fix|chore|refactor)(?:\([^)]+\))?:/i.test(firstLine)) {
              return "patch";
            }

            return "";
          };

          for (const commit of commits) {
            const bump = bumpForCommit(commit);

            if (bump && (!releaseType || bumpRank[bump] > bumpRank[releaseType])) {
              releaseType = bump;
            }
          }

          if (!releaseType) {
            setOutput("should_release", "false");
            setOutput("release_type", "none");
            setOutput("release_source", "auto");
            setOutput(
              "reason",
              "No feat, fix, chore, refactor, or breaking commit found.",
            );
            process.exit(0);
          }

          setOutput("should_release", "true");
          setOutput("release_type", releaseType);
          setOutput("release_source", "commit");
          setOutput("reason", `${releaseType} commit signal found.`);
          NODE
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUESTED_RELEASE_TYPE: ${{ inputs.release_type || 'auto' }}
          BEFORE_SHA: ${{ github.event.pull_request.base.sha }}
          AFTER_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Skip release
        if: ${{ steps.release.outputs.should_release != 'true' }}
        run: echo "${{ steps.release.outputs.reason }}"

      - name: Apply version bump
        if: ${{ steps.release.outputs.should_release == 'true' && steps.release.outputs.release_type != 'initial' }}
        working-directory: packages/core
        run: pnpm version ${{ steps.release.outputs.release_type }} --no-git-tag-version

      - name: Validate initial version
        if: ${{ steps.release.outputs.release_type == 'initial' }}
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const packageJson = JSON.parse(
            fs.readFileSync("packages/core/package.json", "utf8"),
          );

          if (packageJson.version !== "2.0.0") {
            throw new Error(
              `Initial core v2 release must be 2.0.0, found ${packageJson.version}`,
            );
          }
          NODE

      - name: Run release tests
        if: ${{ steps.release.outputs.should_release == 'true' }}
        run: pnpm test:core:2x

      - name: Build package
        if: ${{ steps.release.outputs.should_release == 'true' }}
        run: pnpm --filter @nataliebasille/natcore-design-system build

      - name: Read release version
        if: ${{ steps.release.outputs.should_release == 'true' }}
        id: package
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check release version availability
        if: ${{ steps.release.outputs.should_release == 'true' }}
        id: version_check
        run: |
          if npm view "@nataliebasille/natcore-design-system@${{ steps.package.outputs.version }}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "can_publish=false" >> "$GITHUB_OUTPUT"
            echo "@nataliebasille/natcore-design-system@${{ steps.package.outputs.version }} is already published; skipping publish."
          else
            echo "can_publish=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit release changes
        if: ${{ steps.version_check.outputs.can_publish == 'true' && steps.release.outputs.release_type != 'initial' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/core/package.json pnpm-lock.yaml
          git diff --cached --quiet && echo "No release files changed; continuing without a release commit." || git commit -m "chore: release core v${{ steps.package.outputs.version }} [skip ci]"
          git push

      - name: Auth check
        if: ${{ steps.version_check.outputs.can_publish == 'true' }}
        run: |
          echo "scope registry => $(npm config get @nataliebasille:registry)"
          node -e "console.log(!!process.env.NODE_AUTH_TOKEN && 'TOKEN_PRESENT')"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        if: ${{ steps.version_check.outputs.can_publish == 'true' }}
        working-directory: packages/core
        run: pnpm publish --no-git-checks --access restricted --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release tag
        if: ${{ steps.version_check.outputs.can_publish == 'true' }}
        run: |
          git tag "core-v${{ steps.package.outputs.version }}"
          git push origin "core-v${{ steps.package.outputs.version }}"
